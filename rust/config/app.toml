[server]
host = "127.0.0.1"
port = 8080
frontend_origin = "http://127.0.0.1:3000"

[database]
path = "./data/hybridtrade.db"

[scheduler]
interval_seconds = 30

[orchestration]
default_source_scope = "public_web"
default_priority = "normal"
default_goal = "Thu thập thông tin và tổng hợp phân tích kỹ thuật từ các nguồn public web."
default_sections = [
  "Nguồn và phạm vi",
  "Tín hiệu kỹ thuật",
  "Mâu thuẫn và rủi ro",
  "Tổng hợp cuối"
]
max_parallel_sources = 4
seed_urls = []

[providers.default]
chat = "anthropic"

[providers.openai]
enabled = true
base_url = "http://localhost:4141"
model = "gpt-5.4"
request_retries = 3
retry_backoff_ms = 1500
max_tokens = 400000
temperature = 0.2

[providers.anthropic]
enabled = true
base_url = "http://localhost:4141"
model = "claude-opus-4.6"
light_model = "claude-sonnet-4.6"
request_retries = 3
retry_backoff_ms = 1500
max_tokens = 64000
temperature = 0.2
thinking = true
